name: Immutability gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  gate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run immutability gate
        run: bash scripts/immutability-gate.sh
